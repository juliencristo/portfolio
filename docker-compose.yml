services:
  nginx:
    image: nginx:1.29.1-alpine
    container_name: nginx
    ports: 
      - 80:80
    volumes:
    - ./nginx/local.conf:/etc/nginx/nginx.conf

  portfolio:
    build: 
      context: ./portfolio
    volumes:
      - ./portfolio:/portfolio
      - /portfolio/node_modules
    ports:
      - 5173:5173
    tty: true
    stdin_open: true
  
  

  