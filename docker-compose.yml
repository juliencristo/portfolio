services:

  database:
    image: postgres:17.2-alpine3.20
    env_file: 
      - ./docker.env
    ports:
      - 5432:5432
  nginx:
    image: nginx:1.29.1-alpine
    container_name: nginx
    ports: 
      - 80:80
    volumes:
    - ./nginx/local.conf:/etc/nginx/nginx.conf

  portfolio:
    build: 
      context: ./portfolio
    volumes:
      - ./portfolio:/portfolio
      - /portfolio/node_modules
    ports:
      - 5173:5173
    tty: true
    stdin_open: true
  
  adminer:
    image: adminer
    ports:
      - 8080:8080
    environment:
      - ADMINER_DEFAULT_SERVER=${ADMINER_DEFAULT_SERVER}
      - ADMINER_DEFAULT_DB_DRIVER=${ADMINER_DEFAULT_DB_DRIVER}
    depends_on:
      - database
  

  